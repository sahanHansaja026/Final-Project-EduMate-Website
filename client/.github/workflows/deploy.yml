name: Deploy Next.js to EC2 via Docker Hub

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 🔐 Login Docker Hub
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 🐳 Build image
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/nextjs-app:latest ./client

      # 📤 Push image
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/nextjs-app:latest

      # 🚀 Deploy to EC2
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/nextjs-app:latest

            docker stop nextjs-app || true
            docker rm nextjs-app || true

            docker run -d \
              --name nextjs-app \
              -p 3000:3000 \
              ${{ secrets.DOCKER_USERNAME }}/nextjs-app:latest