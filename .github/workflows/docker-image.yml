name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            set -e

            echo "🚀 Pulling latest code..."
            cd ~/Final-Project-EduMate-Website
            git pull origin main

            echo "🐳 Building Docker image..."
            cd backend

            docker stop fastapi-backend || true
            docker rm fastapi-backend || true

            docker build -t fastapi-app .

            echo "🚀 Running container with GitHub Secrets..."

            docker run -d \
              --name fastapi-backend \
              -p 8000:8000 \
              -e DATABASE_URL='${{ secrets.DATABASE_URL }}' \
              -e AWS_ACCESS_KEY_ID='${{ secrets.AWS_ACCESS_KEY_ID }}' \
              -e AWS_SECRET_ACCESS_KEY='${{ secrets.AWS_SECRET_ACCESS_KEY }}' \
              -e AWS_BUCKET_NAME='${{ secrets.AWS_BUCKET_NAME }}' \
              -e AWS_REGION='${{ secrets.AWS_REGION }}' \
              -e GOOGLE_API_KEY='${{ secrets.GOOGLE_API_KEY }}' \
              -e GOOGLE_CSE_ID='${{ secrets.GOOGLE_CSE_ID }}' \
              -e OPENROUTER_API_KEY='${{ secrets.OPENROUTER_API_KEY }}' \
              fastapi-app

            echo "✅ Deployment successful"
